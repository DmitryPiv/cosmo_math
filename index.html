<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Космическая математика 🚀 - Планеты v13.1</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --green: #4ecca3;
            --yellow: #f5c518;
            --red: #e94560;
            --star: #f5c518;
            --btn: #1a1a4e;
            --correct: #4ecca3;
            --wrong: #ff6b6b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .cosmos {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background: radial-gradient(circle at 20% 20%, #1a1a3e, #0a0a1a);
            transition: background 1s;
        }
        .star-field {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(1px 1px at 10% 20%, white, transparent),
                        radial-gradient(1px 1px at 25% 65%, white, transparent),
                        radial-gradient(1.5px 1.5px at 40% 15%, #f5c518, transparent),
                        radial-gradient(2px 2px at 70% 35%, #4ecca3, transparent),
                        radial-gradient(1px 1px at 85% 55%, white, transparent);
        }
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 520px;
            padding: 20px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .screen.active { display: flex; }

        .btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 14px 24px; border-radius: 25px;
            font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.2s; margin: 6px;
        }
        .btn:active { transform: scale(0.93); }
        .btn.primary { background: var(--green); border: none; color: #000; box-shadow: 0 6px 0 #2e8b57; }
        .btn.warn { background: var(--red); border: none; color: white; box-shadow: 0 6px 0 #b8324a; }
        .btn.gold { background: var(--yellow); border: none; color: #000; box-shadow: 0 6px 0 #b38f00; }

        .global-stars {
            position: fixed; top: 20px; right: 70px; font-size: 22px; font-weight: bold;
            color: gold; z-index: 15; pointer-events: none;
            text-shadow: 0 0 10px gold; animation: glitter 1.5s infinite;
            background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 20px;
        }
        @keyframes glitter { 0%,100% { text-shadow: 0 0 10px gold; } 50% { text-shadow: 0 0 20px yellow; } }

        .menu-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 20px; width: 100%; margin-top: 30px;
        }
        .rocket-area { position: relative; margin-bottom: 20px; }
        .rocket { font-size: 80px; position: relative; z-index: 1; }
        .menu-title { font-size: 48px; font-weight: 900; color: white; text-shadow: 0 0 30px rgba(255,255,255,0.5); }
        .menu-sub { color: rgba(255,255,255,0.7); font-size: 16px; }
        .menu-buttons { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 320px; }
        .menu-btn {
            background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
            border-radius: 30px; padding: 20px; font-size: 24px; font-weight: 800;
            color: white; text-align: center; cursor: pointer; backdrop-filter: blur(15px);
            transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .menu-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.15); }

        .quick-top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.06); backdrop-filter: blur(15px);
            border-radius: 25px; padding: 10px 16px; width: 100%; border: 1px solid rgba(255,255,255,0.1);
        }
        .level-badge { display: flex; align-items: center; gap: 6px; color: white; font-weight: 700; font-size: 14px; }
        .diff-btn {
            background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px 12px;
            border-radius: 18px; cursor: pointer; font-size: 14px; font-weight: 700; transition: 0.2s;
        }
        .diff-btn.active-easy { background: var(--green); color:#000; }
        .diff-btn.active-medium { background: var(--yellow); color:#000; }
        .diff-btn.active-hard { background: var(--red); }
        .back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: white; padding: 0 10px; }

        .game-card {
            background: rgba(255,255,255,0.07); backdrop-filter: blur(25px);
            border-radius: 35px; padding: 20px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .character-zone { position: relative; width: 120px; height: 120px; margin-bottom: 10px; }
        .astronaut { font-size: 80px; transition: 0.2s; cursor: pointer; text-align: center; display: block; }
        .astronaut.bounce { animation: bounceAnim 0.6s; }
        .astronaut.shake { animation: shakeAnim 0.5s; }
        @keyframes bounceAnim { 0%,100%{ transform: translateY(0); } 40%{ transform: translateY(-30px); } 60%{ transform: translateY(-8px); } }
        @keyframes shakeAnim { 0%,100%{ transform: translateX(0); } 20%{ transform: translateX(-10px) rotate(-5deg); } 40%{ transform: translateX(10px) rotate(5deg); } 60%{ transform: translateX(-6px) rotate(-3deg); } }
        .speech {
            position: absolute; top: -15px; right: -60px; background: white; color: #222;
            padding: 10px 16px; border-radius: 20px; font-size: 14px; font-weight: 700;
            white-space: nowrap; opacity: 0; transform: scale(0.7); transition: 0.3s; pointer-events: none;
        }
        .speech.visible { opacity: 1; transform: scale(1); }
        .star-track { display: flex; gap: 6px; margin-bottom: 15px; }
        .star-icon { font-size: 28px; filter: grayscale(1) brightness(0.5); opacity: 0.25; transition: 0.3s; }
        .star-icon.collected { filter: none; opacity: 1; animation: starPop 0.4s; }
        @keyframes starPop { 0%{ transform: scale(0) rotate(-30deg); } 60%{ transform: scale(1.3) rotate(10deg); } 100%{ transform: scale(1) rotate(0); } }

        .task-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .task-box {
            background: rgba(255,255,255,0.08);
            border-radius: 25px;
            padding: 15px 20px;
            margin-bottom: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .task-num { font-size: 48px; font-weight: 900; color: white; min-width: 50px; text-align: center; }
        .task-op { font-size: 36px; font-weight: 900; color: var(--star); }
        .task-unknown { font-size: 48px; font-weight: 900; color: var(--yellow); animation: unknownPulse 1.2s infinite; }
        @keyframes unknownPulse { 0%,100%{ opacity:1; transform: scale(1); } 50%{ opacity:0.4; transform: scale(1.05); } }
        .visual-aid { display: flex; flex-direction: column; align-items: center; margin: 10px 0; gap: 6px; }
        .counter-row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-start; }
        .counter-dot {
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--green); box-shadow: 0 0 10px rgba(78,204,163,0.7);
            animation: dotAppear 0.3s forwards; opacity: 0; transform: scale(0);
        }
        @keyframes dotAppear { to { opacity:1; transform: scale(1); } }
        .answer-field {
            background: rgba(0,0,0,0.35); border: 3px dashed rgba(255,255,255,0.4);
            border-radius: 20px; width: 100px; height: 65px;
            display: flex; align-items: center; justify-content: center;
            font-size: 42px; font-weight: 900; color: white;
            transition: 0.3s; flex-shrink: 0;
        }
        .answer-field.filled { border-color: var(--star); border-style: solid; background: rgba(245,197,24,0.12); }
        .answer-field.wrong-flash { border-color: var(--wrong); background: rgba(255,107,107,0.2); animation: shake 0.4s; }
        @keyframes shake { 0%,100%{ transform: translateX(0); } 25%{ transform: translateX(-8px); } 50%{ transform: translateX(8px); } 75%{ transform: translateX(-5px); } }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 280px; margin-bottom: 8px; }
        .key {
            background: var(--btn); color: white; font-size: 34px; font-weight: 900; border: none;
            border-radius: 10px; padding: 14px 0; cursor: pointer; box-shadow: 0 6px 0 #12123a;
            transition: 0.1s; aspect-ratio: 1;
        }
        .key:active { transform: scale(0.95); }
        .key-clear { background: #ff6b6b; box-shadow: 0 6px 0 #c0392b; font-size: 26px; }
        .key-check { background: var(--correct); box-shadow: 0 6px 0 #2e8b57; font-size: 26px; }

        .planet-view { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .planet-nav { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px; }
        .planet-card-round {
            background: rgba(255,255,255,0.1); border-radius: 50%; width: 200px; height: 200px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid var(--green); margin: 10px auto;
        }
        .level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .level-cell {
            width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold;
            cursor: pointer; color: white;
        }
        .level-cell.completed { background: var(--correct); color: black; }
        .progress-info { text-align: center; color: white; margin: 5px 0; font-size: 14px; }
        .planet-arrow { font-size: 36px; background: none; border: none; color: white; cursor: pointer; }

        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center; align-items: center;
            z-index: 20;
        }
        .overlay.open { display: flex; }
        .dialog {
            background: white; border-radius: 30px; padding: 30px; text-align: center;
            max-width: 340px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .dialog h2 { font-size: 28px; margin: 10px 0; }
        .big-emoji { font-size: 80px; }
        .btn-sm { padding: 10px 20px; font-size: 16px; border-radius: 20px; }

        @media (max-width: 400px) {
            .task-num { font-size: 36px; min-width: 40px; }
            .task-op { font-size: 28px; }
            .task-unknown { font-size: 36px; }
            .key { font-size: 26px; padding: 10px 0; }
            .planet-card-round { width: 150px; height: 150px; }
            .planet-card-round div:first-child { font-size: 40px; }
            .level-cell { width: 32px; height: 32px; font-size: 12px; }
            .menu-title { font-size: 36px; }
            .menu-btn { font-size: 20px; padding: 15px; }
            .global-stars { font-size: 18px; top: 10px; right: 60px; }
            .rocket { font-size: 60px; }
            .astronaut { font-size: 60px; }
            .character-zone { width: 90px; height: 90px; }
            .task-row { gap: 8px; }
        }
    </style>
</head>
<body>
<div class="cosmos"><div class="star-field"></div></div>
<div class="global-stars" id="globalStarsDisplay">⭐ 0</div>
<button class="sound-toggle" id="soundToggle" onclick="toggleSound()" style="position:fixed;top:20px;right:20px;z-index:15;background:rgba(255,255,255,0.1);border:none;font-size:28px;padding:8px;border-radius:50%;cursor:pointer;">🔊</button>

<!-- Главное меню -->
<div class="screen active" id="menuScreen">
    <div class="menu-container">
        <div class="rocket-area"><div class="rocket">🚀</div></div>
        <h1 class="menu-title">Космо-математика</h1>
        <p class="menu-sub">Выбери режим</p>
        <div class="menu-buttons">
            <div class="menu-btn" onclick="startQuickGame()">🎮 Быстрая игра</div>
            <div class="menu-btn" onclick="startCampaign()">🏆 Кампания</div>
            <div class="menu-btn" onclick="openStats()">📊 Статистика</div>
            <div class="menu-btn" onclick="openSettings()">⚙️ Настройки</div>
        </div>
    </div>
</div>

<!-- Быстрая игра -->
<div class="screen" id="quickGameScreen">
    <div class="quick-top-bar">
        <button class="back-btn" onclick="goToMenu()">←</button>
        <div class="level-badge"><span id="qPlanetIcon">🟢</span><span id="qLevelLabel">Лёгкий</span></div>
        <div style="display:flex; gap:4px;">
            <button class="diff-btn active-easy" onclick="setQuickDifficulty('easy')" id="qEasy">10</button>
            <button class="diff-btn" onclick="setQuickDifficulty('medium')" id="qMedium">50</button>
            <button class="diff-btn" onclick="setQuickDifficulty('hard')" id="qHard">100</button>
        </div>
    </div>
    <div class="game-card" id="quickGameCard"></div>
</div>

<!-- Кампания -->
<div class="screen" id="campaignScreen">
    <div style="display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom:20px;">
        <button class="back-btn" onclick="goToMenu()">←</button>
        <h2 style="color:white;">🏆 Кампания</h2>
    </div>
    <div id="planetView" class="planet-view"></div>
    <div id="campaignPlayArea" style="display:none; width:100%;"></div>
</div>

<!-- Оверлеи -->
<div class="overlay" id="winOverlay">
    <div class="dialog">
        <div class="big-emoji" id="winEmoji">🏆</div>
        <h2 id="winTitle"></h2>
        <p id="winMsg"></p>
        <div style="display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:15px;">
            <button class="btn primary" id="winActionBtn" onclick="handleWinAction()"></button>
        </div>
    </div>
</div>
<div class="overlay" id="infoOverlay">
    <div class="dialog">
        <h2 id="infoTitle"></h2>
        <p id="infoMsg"></p>
        <button class="btn primary" onclick="closeInfo()">OK</button>
    </div>
</div>
<div class="overlay" id="settingsOverlay" onclick="closeSettings(event)">
    <div class="dialog" style="background:#1a1a3e; color:white;" onclick="event.stopPropagation()">
        <h3>⚙️ Настройки</h3>
        <button class="btn warn" onclick="confirmReset()">Сбросить прогресс кампании</button>
        <button class="btn" onclick="closeSettingsManual()">Закрыть</button>
    </div>
</div>
<div class="overlay" id="confirmOverlay">
    <div class="dialog">
        <p>Вы уверены, что хотите сбросить весь прогресс кампании?</p>
        <button class="btn warn" onclick="resetCampaignConfirmed()">Да, сбросить</button>
        <button class="btn" onclick="closeConfirm()">Отмена</button>
    </div>
</div>

<script>
// ==================== ЗВУК ====================
let soundEnabled = true;
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function playTone(freq, dur, type='sine', vol=0.12) {
    if (!soundEnabled) return;
    try {
        initAudio();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + dur);
    } catch(e){}
}
function sfxCorrect() { playTone(660,0.15); setTimeout(()=>playTone(880,0.2),150); }
function sfxWrong() { playTone(180,0.3,'square',0.08); }
function sfxClick() { playTone(440,0.06,'sine',0.08); }
function sfxStar() { playTone(1040,0.2,'triangle',0.1); }
function sfxWin() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.25,'triangle',0.12), i*150)); }
function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
    if(soundEnabled) sfxClick();
}

// ==================== ДАННЫЕ ПЛАНЕТ ====================
const planetsData = [
    {
        id: 0, name: 'Зелёная', icon: '🟢', topic: 'plusminus', color: 'var(--green)',
        threshold: 40,
        levels: [
            { difficulty: 'easy' }, { difficulty: 'easy' }, { difficulty: 'easy' },
            { difficulty: 'medium' }, { difficulty: 'medium' }, { difficulty: 'medium' },
            { difficulty: 'hard' }, { difficulty: 'hard' }, { difficulty: 'hard' },
            { difficulty: 'hard' }
        ]
    },
    {
        id: 1, name: 'Жёлтая', icon: '🟡', topic: 'make', color: 'var(--yellow)',
        threshold: 40,
        levels: [
            { difficulty: 'easy' }, { difficulty: 'easy' }, { difficulty: 'easy' },
            { difficulty: 'medium' }, { difficulty: 'medium' }, { difficulty: 'medium' },
            { difficulty: 'hard' }, { difficulty: 'hard' }, { difficulty: 'hard' },
            { difficulty: 'hard' }
        ]
    },
    {
        id: 2, name: 'Красная', icon: '🔴', topic: 'chain', color: 'var(--red)',
        threshold: 40,
        levels: [
            { difficulty: 'easy' }, { difficulty: 'easy' }, { difficulty: 'easy' },
            { difficulty: 'medium' }, { difficulty: 'medium' }, { difficulty: 'medium' },
            { difficulty: 'hard' }, { difficulty: 'hard' }, { difficulty: 'hard' },
            { difficulty: 'hard' }
        ]
    }
];

// ==================== СОСТОЯНИЕ ====================
const gameState = {
    mode: 'quick',
    difficulty: 'easy',
    topic: 'plusminus',
    currentAnswer: 0,
    userInput: '',
    stars: 0,
    maxStars: 5,
    totalCorrect: 0,
    totalWrong: 0,
    totalStarsEver: 0,
    campaign: {
        currentPlanet: 0,
        currentLevel: 0,
        starsPerLevel: {},
        unlockedPlanets: [0]
    }
};

// ==================== ЭКРАНЫ ====================
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
function goToMenu() { sfxClick(); showScreen('menuScreen'); document.querySelector('.cosmos').style.background = ''; }

// ==================== ГЛОБАЛЬНЫЙ СЧЁТЧИК ====================
function updateGlobalStarsDisplay() {
    let total = 0;
    for (const key in gameState.campaign.starsPerLevel) total += gameState.campaign.starsPerLevel[key];
    document.getElementById('globalStarsDisplay').textContent = `⭐ ${total}`;
}

// ==================== БЫСТРАЯ ИГРА ====================
function startQuickGame() {
    gameState.mode = 'quick'; gameState.stars = 0;
    gameState.difficulty = 'easy'; gameState.topic = 'plusminus';
    document.getElementById('qEasy').className = 'diff-btn active-easy';
    document.getElementById('qMedium').className = 'diff-btn';
    document.getElementById('qHard').className = 'diff-btn';
    document.getElementById('qPlanetIcon').textContent = '🟢';
    document.getElementById('qLevelLabel').textContent = '10';
    buildQuickGameUI();
    showScreen('quickGameScreen');
    generateTask();
}
function buildQuickGameUI() {
    const card = document.getElementById('quickGameCard');
    card.innerHTML = `
        <div class="character-zone"><span class="astronaut" id="astronaut" onclick="tapAstronaut()">👨‍🚀</span><div class="speech" id="speech"></div></div>
        <div class="star-track" id="starTrack">${'<span class="star-icon">⭐</span>'.repeat(5)}</div>
        <div class="visual-aid" id="visualAid"></div>
        <div class="task-row">
            <div class="task-box">
                <span class="task-num" id="num1">5</span>
                <span class="task-op" id="opSign">+</span>
                <span class="task-num" id="num2">3</span>
                <span class="task-op">=</span>
                <span class="task-unknown" id="unknownMark">?</span>
            </div>
            <div class="answer-field" id="answerField"></div>
        </div>
        <div class="keypad" id="keypad"></div>`;
    gameState.userInput = ''; updateAnswerField(); buildKeypad();
}
function setQuickDifficulty(lvl) {
    gameState.difficulty = lvl;
    document.getElementById('qEasy').className = 'diff-btn'+(lvl==='easy'?' active-easy':'');
    document.getElementById('qMedium').className = 'diff-btn'+(lvl==='medium'?' active-medium':'');
    document.getElementById('qHard').className = 'diff-btn'+(lvl==='hard'?' active-hard':'');
    document.getElementById('qPlanetIcon').textContent = lvl==='easy'?'🟢':(lvl==='medium'?'🟡':'🔴');
    document.getElementById('qLevelLabel').textContent = lvl==='easy'?'10':(lvl==='medium'?'50':'100');
    gameState.stars=0; updateStarsDisplay(); generateTask();
}

// ==================== КАМПАНИЯ ====================
function startCampaign() {
    gameState.mode = 'campaign';
    loadCampaignProgress();
    showScreen('campaignScreen');
    updateGlobalStarsDisplay();
    showPlanet(0);
}
function loadCampaignProgress() {
    try {
        const raw = localStorage.getItem('cosmoCampaignV3');
        if (raw) Object.assign(gameState.campaign, JSON.parse(raw));
    } catch(e) {}
    updateGlobalStarsDisplay();
}
function saveCampaignProgress() {
    localStorage.setItem('cosmoCampaignV3', JSON.stringify(gameState.campaign));
    updateGlobalStarsDisplay();
}
function changeBackground(planetId) {
    const bgColors = ['#1a2a1a', '#2a2a1a', '#2a1a1a'];
    document.querySelector('.cosmos').style.background = `radial-gradient(circle at 20% 20%, ${bgColors[planetId]}, #0a0a1a)`;
}
function showPlanet(index) {
    if (!gameState.campaign.unlockedPlanets.includes(index)) return;
    changeBackground(index);
    const planet = planetsData[index];
    const starsPerLevel = gameState.campaign.starsPerLevel;
    let totalStars = 0;
    planet.levels.forEach((_, idx) => totalStars += starsPerLevel[`${index}-${idx}`] || 0);
    const nextPlanetUnlocked = gameState.campaign.unlockedPlanets.includes(index+1);
    const thresholdText = nextPlanetUnlocked ? '' : `Следующая планета откроется на ${planet.threshold} звёздах (сейчас ${totalStars})`;

    const view = document.getElementById('planetView');
    view.innerHTML = `
        <div class="planet-nav">
            <button class="planet-arrow" onclick="showPlanet(${index-1})" ${index===0?'disabled':''} style="visibility:${index===0?'hidden':'visible'};">◀</button>
            <div class="planet-card-round" style="border-color:${planet.color}; background:${planet.color}22;">
                <div style="font-size:60px;">${planet.icon}</div>
                <div style="color:white;">${planet.name}</div>
            </div>
            <button class="planet-arrow" onclick="showPlanet(${index+1})" ${!nextPlanetUnlocked?'disabled':''} style="visibility:${!nextPlanetUnlocked?'hidden':'visible'};">▶</button>
        </div>
        <div class="level-grid">
            ${planet.levels.map((_, idx) => {
                const stars = starsPerLevel[`${index}-${idx}`] || 0;
                return `<div class="level-cell ${stars>=5?'completed':''}" onclick="startPlanetLevel(${index},${idx})">${stars>=5?'⭐'+stars:idx+1}</div>`;
            }).join('')}
        </div>
        <div class="progress-info">${thresholdText}</div>
    `;
    document.getElementById('campaignPlayArea').style.display = 'none';
}
function startPlanetLevel(planetId, levelIdx) {
    const planet = planetsData[planetId];
    gameState.campaign.currentPlanet = planetId;
    gameState.campaign.currentLevel = levelIdx;
    gameState.difficulty = planet.levels[levelIdx].difficulty;
    gameState.topic = planet.topic;
    gameState.maxStars = 5;
    gameState.stars = 0;
    document.getElementById('planetView').style.display = 'none';
    const area = document.getElementById('campaignPlayArea');
    area.style.display = 'block';
    buildCampaignGameUI(area, planet);
    updateStarsDisplayCampaign();
    generateTask();
}
function buildCampaignGameUI(container, planet) {
    container.innerHTML = `
        <div class="game-card">
            <div class="character-zone"><span class="astronaut" id="astronautC" onclick="tapAstronaut()">👨‍🚀</span><div class="speech" id="speechC">Уровень ${gameState.campaign.currentLevel+1}</div></div>
            <div class="star-track" id="starTrackC">${'<span class="star-icon">⭐</span>'.repeat(gameState.maxStars)}</div>
            <div class="visual-aid" id="visualAidC"></div>
            <div class="task-row">
                <div class="task-box" id="taskBoxC">
                    <span class="task-num" id="num1C">5</span>
                    <span class="task-op" id="opSignC">+</span>
                    <span class="task-num" id="num2C">3</span>
                    <span class="task-op">=</span>
                    <span class="task-unknown" id="unknownMarkC">?</span>
                </div>
                <div class="answer-field" id="answerFieldC"></div>
            </div>
            <div class="keypad" id="keypadC"></div>
            <button class="btn warn" onclick="exitCampaignLevel()">Выйти</button>
        </div>`;
    gameState.userInput = ''; updateAnswerField(); buildKeypad();
}
function exitCampaignLevel() {
    document.getElementById('campaignPlayArea').style.display = 'none';
    document.getElementById('planetView').style.display = '';
    showPlanet(gameState.campaign.currentPlanet);
}

// ==================== ОКНА ====================
function showInfo(msg) {
    document.getElementById('infoTitle').textContent = 'Сообщение';
    document.getElementById('infoMsg').textContent = msg;
    document.getElementById('infoOverlay').classList.add('open');
}
function closeInfo() { document.getElementById('infoOverlay').classList.remove('open'); }
function openSettings() { document.getElementById('settingsOverlay').classList.add('open'); }
function closeSettings(e) { if(e.target === document.getElementById('settingsOverlay')) document.getElementById('settingsOverlay').classList.remove('open'); }
function closeSettingsManual() { document.getElementById('settingsOverlay').classList.remove('open'); sfxClick(); }
function confirmReset() { document.getElementById('settingsOverlay').classList.remove('open'); document.getElementById('confirmOverlay').classList.add('open'); }
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); }
function resetCampaignConfirmed() {
    gameState.campaign = { currentPlanet:0, currentLevel:0, starsPerLevel:{}, unlockedPlanets:[0] };
    saveCampaignProgress();
    showPlanet(0);
    document.getElementById('confirmOverlay').classList.remove('open');
}

// ==================== КЛАВИАТУРА ====================
function buildKeypad() {
    const pad = document.getElementById('keypad') || document.getElementById('keypadC');
    if (pad) {
        pad.innerHTML = `
            <button class="key" onclick="pressDigit(1)">1</button><button class="key" onclick="pressDigit(2)">2</button><button class="key" onclick="pressDigit(3)">3</button>
            <button class="key" onclick="pressDigit(4)">4</button><button class="key" onclick="pressDigit(5)">5</button><button class="key" onclick="pressDigit(6)">6</button>
            <button class="key" onclick="pressDigit(7)">7</button><button class="key" onclick="pressDigit(8)">8</button><button class="key" onclick="pressDigit(9)">9</button>
            <button class="key key-clear" onclick="clearInput()">⌫</button><button class="key" onclick="pressDigit(0)">0</button><button class="key key-check" onclick="submitAnswer()">✓</button>`;
    }
}

// ==================== ГЕНЕРАЦИЯ ====================
function getMaxByDifficulty() {
    if (gameState.difficulty === 'easy') return 10;
    if (gameState.difficulty === 'medium') return 50;
    return 100;
}
function generateValidNumbers(op, max) {
    for(let i=0;i<50;i++) {
        let a = Math.floor(Math.random()*(max-1))+1;
        let b = Math.floor(Math.random()*(op==='addition'?(max-a):a))+1;
        if(op==='addition'&&(a%10)+(b%10)<=9) return {a,b,answer:a+b};
        if(op==='subtraction'&&(a%10)>=(b%10)) return {a,b,answer:a-b};
    }
    let a=Math.floor(Math.random()*5)+1,b=Math.floor(Math.random()*5)+1;
    return op==='addition'?{a,b,answer:a+b}:{a:Math.max(a,b),b:Math.min(a,b),answer:Math.abs(a-b)};
}
function generateTask() {
    const max = getMaxByDifficulty();
    if (gameState.topic === 'plusminus') {
        const isAdd = Math.random()<0.5;
        const {a,b,answer} = generateValidNumbers(isAdd?'addition':'subtraction', max);
        gameState.currentAnswer = answer;
        const num1El = getEl('num1');
        const num2El = getEl('num2');
        const opEl = getEl('opSign');
        const unkEl = getEl('unknownMark');
        if (num1El) num1El.textContent = a;
        if (num2El) num2El.textContent = b;
        if (opEl) opEl.textContent = isAdd ? '+' : '-';
        if (unkEl) unkEl.textContent = '?';
        renderVisualAid(a, b, !isAdd);
    } else if (gameState.topic === 'make') {
        const target = max;
        const known = Math.floor(Math.random() * target) + 1;
        const answer = target - known;
        gameState.currentAnswer = answer;
        const taskBox = document.getElementById('taskBoxC');
        if (taskBox) {
            taskBox.innerHTML = `<span class="task-num">${known}</span><span class="task-op">+</span><span class="task-unknown">?</span><span class="task-op">=</span><span class="task-num">${target}</span>`;
        }
        renderVisualAid(known, answer, false);
    } else if (gameState.topic === 'chain') {
        const a = Math.floor(Math.random() * Math.floor(max/2)) + 1;
        const b = Math.floor(Math.random() * Math.floor(max/2)) + 1;
        const target = Math.floor(Math.random() * max) + 1;
        const answer = target + b - a;
        gameState.currentAnswer = answer;
        const taskBox = document.getElementById('taskBoxC');
        if (taskBox) {
            taskBox.innerHTML = `<span class="task-unknown">?</span><span class="task-op">+</span><span class="task-num">${a}</span><span class="task-op">-</span><span class="task-num">${b}</span><span class="task-op">=</span><span class="task-num">${target}</span>`;
        }
    }
    gameState.userInput = '';
    updateAnswerField();
}
function getEl(id) {
    return document.getElementById(id) || document.getElementById(id+'C');
}
function renderVisualAid(val1, val2, isSub) {
    const container = document.getElementById('visualAid') || document.getElementById('visualAidC');
    if (!container) return;
    container.innerHTML = '';
    const makeDots = (count, color) => {
        const rows = Math.ceil(count / 10);
        for (let r = 0; r < rows; r++) {
            const row = document.createElement('div');
            row.className = 'counter-row';
            const dotsInRow = Math.min(10, count - r * 10);
            for (let i = 0; i < dotsInRow; i++) {
                const dot = document.createElement('span');
                dot.className = 'counter-dot';
                dot.style.backgroundColor = color;
                dot.style.boxShadow = `0 0 10px ${color}`;
                row.appendChild(dot);
            }
            container.appendChild(row);
        }
    };
    makeDots(val1, 'var(--green)');
    if (isSub) makeDots(val2, 'var(--red)');
    else makeDots(val2, 'var(--yellow)');
}
function pressDigit(d){ sfxClick(); if(gameState.userInput.length>=3)return; gameState.userInput+=d; updateAnswerField(); }
function clearInput(){ sfxClick(); gameState.userInput=''; updateAnswerField(); }
function updateAnswerField(){
    const field = document.getElementById('answerField')||document.getElementById('answerFieldC');
    if(!field)return;
    if(gameState.userInput===''){ field.textContent=''; field.classList.remove('filled'); }
    else{ field.textContent=gameState.userInput; field.classList.add('filled'); }
}
function submitAnswer(){
    if(gameState.userInput==='')return;
    if(parseInt(gameState.userInput)==gameState.currentAnswer) onCorrect(); else onWrong();
}
function onCorrect(){
    sfxCorrect(); gameState.totalCorrect++; gameState.totalStarsEver++;
    if(gameState.mode==='quick'){
        gameState.stars++; updateStarsDisplay();
        if(gameState.stars>=5){ setTimeout(showWinQuick,600); return; }
    }else{
        gameState.stars++; updateStarsDisplayCampaign();
        const key = `${gameState.campaign.currentPlanet}-${gameState.campaign.currentLevel}`;
        const prev = gameState.campaign.starsPerLevel[key]||0;
        if(gameState.stars>prev){
            gameState.campaign.starsPerLevel[key]=gameState.stars;
            checkPlanetCompletion();
            saveCampaignProgress();
        }
        if(gameState.stars>=5){ setTimeout(completeLevel,600); return; }
    }
    setTimeout(generateTask,800); saveStats();
}
function onWrong(){
    sfxWrong(); gameState.totalWrong++;
    const field = document.getElementById('answerField')||document.getElementById('answerFieldC');
    // Убрали показ правильного ответа
    field.classList.add('wrong-flash');
    setTimeout(()=>{
        gameState.userInput='';
        updateAnswerField();
        field.classList.remove('wrong-flash');
    }, 800);
    saveStats();
}
function updateStarsDisplay(){ const track=document.getElementById('starTrack'); if(track)Array.from(track.children).forEach((s,i)=>s.classList.toggle('collected',i<gameState.stars)); if(gameState.stars>0)sfxStar(); }
function updateStarsDisplayCampaign(){ const track=document.getElementById('starTrackC'); if(track)Array.from(track.children).forEach((s,i)=>s.classList.toggle('collected',i<gameState.stars)); if(gameState.stars>0)sfxStar(); }
function completeLevel(){ showInfo('Уровень пройден!'); exitCampaignLevel(); }
function checkPlanetCompletion(){
    const planetId = gameState.campaign.currentPlanet;
    const planet = planetsData[planetId];
    let total = 0;
    planet.levels.forEach((_, idx) => total += gameState.campaign.starsPerLevel[`${planetId}-${idx}`]||0);
    if(total >= planet.threshold && !gameState.campaign.unlockedPlanets.includes(planetId+1) && planetId+1 < planetsData.length){
        gameState.campaign.unlockedPlanets.push(planetId+1);
        saveCampaignProgress();
    }
}
function showWinQuick(){
    document.getElementById('winEmoji').textContent='🏆';
    document.getElementById('winTitle').textContent='Молодец!';
    document.getElementById('winMsg').textContent='Ты собрал все звёзды!';
    document.getElementById('winActionBtn').textContent='Играть ещё';
    document.getElementById('winOverlay').classList.add('open');
    window._winAction='quick_replay';
    sfxWin();
}
function handleWinAction(){ document.getElementById('winOverlay').classList.remove('open'); if(window._winAction==='quick_replay') startQuickGame(); }

function openStats(){
    sfxClick();
    const acc = gameState.totalCorrect+gameState.totalWrong>0?Math.round(gameState.totalCorrect/(gameState.totalCorrect+gameState.totalWrong)*100):100;
    document.getElementById('statsContent').innerHTML = `<p>✅ Правильно: <b>${gameState.totalCorrect}</b></p><p>❌ Ошибок: <b>${gameState.totalWrong}</b></p><p>🎯 Точность: <b>${acc}%</b></p><p>⭐ Всего звёзд: <b>${gameState.totalStarsEver}</b></p>`;
    document.getElementById('statsOverlay')?.classList.add('open');
}
function closeStats(e){ if(e.target===document.getElementById('statsOverlay')) document.getElementById('statsOverlay').classList.remove('open'); }
function closeStatsManual(){ document.getElementById('statsOverlay').classList.remove('open'); sfxClick(); }
function saveStats(){ localStorage.setItem('cosmoStats',JSON.stringify({correct:gameState.totalCorrect,wrong:gameState.totalWrong,stars:gameState.totalStarsEver})); }
function loadStats(){
    try{ const raw=localStorage.getItem('cosmoStats'); if(raw){ const d=JSON.parse(raw); gameState.totalCorrect=d.correct||0; gameState.totalWrong=d.wrong||0; gameState.totalStarsEver=d.stars||0; } }catch(e){}
}
function tapAstronaut(){ playTone(350,0.08,'sine',0.06); const a=document.getElementById('astronaut')||document.getElementById('astronautC'); if(a){a.classList.add('bounce');setTimeout(()=>a.classList.remove('bounce'),600);} }

loadStats();
updateGlobalStarsDisplay();
document.addEventListener('touchstart', e => {
    if(e.target.matches('.key, .diff-btn, .topic-chip, .planet-arrow')) {
        e.preventDefault();
        e.target.click();
    }
}, {passive: false});
</script>
